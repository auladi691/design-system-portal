# One Design - Supabase CLI configuration
# Minimal valid config for Supabase CLI v2.x
# Used for `supabase db push --linked` in GitHub Actions
# Docs: https://supabase.com/docs/guides/local-development/cli/config
# Project ref is provided via SUPABASE_PROJECT_REF env/secret during CI - link command uses it

project_id = "design-system-portal"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_signup = true
enable_manual_linking = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = false
